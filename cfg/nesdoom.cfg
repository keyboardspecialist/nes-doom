# NES Doom PoC — MMC5 (mapper 5), NES 2.0
# 128KB PRG-ROM as 16 x 8KB banks (PRG mode 3), 1MB CHR-ROM.
# Bankable data segments (LUTxx) assemble at $8000 (the $5114 window).
# Fixed code lives in PRG0E ($C000 via $5116) and PRG0F ($E000 via $5117,
# which the MMC5 maps to the last bank at power-on — reset path must be there).

MEMORY {
    ZP:     start = $0000, size = $0100, type = rw, define = yes;
    OAMBUF: start = $0200, size = $0100, type = rw, define = yes;
    RAM:    start = $0300, size = $0500, type = rw, define = yes;
    PRGRAM: start = $6000, size = $2000, type = rw, define = yes;

    HDR:    start = $0000, size = $0010, fill = yes, file = %O;

    PRG00:  start = $8000, size = $2000, fill = yes, file = %O;
    PRG01:  start = $A000, size = $2000, fill = yes, file = %O;   # $5115 window (map data)
    PRG02:  start = $8000, size = $2000, fill = yes, file = %O;
    PRG03:  start = $8000, size = $2000, fill = yes, file = %O;
    PRG04:  start = $A000, size = $2000, fill = yes, file = %O;
    PRG05:  start = $A000, size = $2000, fill = yes, file = %O;
    PRG06:  start = $A000, size = $2000, fill = yes, file = %O;
    PRG07:  start = $8000, size = $2000, fill = yes, file = %O;
    PRG08:  start = $8000, size = $2000, fill = yes, file = %O;
    PRG09:  start = $8000, size = $2000, fill = yes, file = %O;
    PRG0A:  start = $8000, size = $2000, fill = yes, file = %O;
    PRG0B:  start = $8000, size = $2000, fill = yes, file = %O;
    PRG0C:  start = $8000, size = $2000, fill = yes, file = %O;
    PRG0D:  start = $8000, size = $2000, fill = yes, file = %O;
    PRG0E:  start = $C000, size = $2000, fill = yes, file = %O;
    PRG0F0: start = $E000, size = $1FFA, fill = yes, file = %O;
    PRG0FV: start = $FFFA, size = $0006, fill = yes, file = %O;

    CHR:    start = $0000, size = $100000, fill = yes, file = %O;
}

SEGMENTS {
    HEADER:   load = HDR;
    ZEROPAGE: load = ZP,     type = zp;
    OAM:      load = OAMBUF, type = bss, define = yes;
    BSS:      load = RAM,    type = bss, define = yes;
    PRGRAM:   load = PRGRAM, type = bss, define = yes;

    LUT00:    load = PRG00,  optional = yes;
    LUT01:    load = PRG01,  optional = yes;
    PUSHA:    load = PRG02,  optional = yes;
    PUSHB:    load = PRG03,  optional = yes;
    MAPSEG0:  load = PRG04,  optional = yes;
    MAPSEG1:  load = PRG05,  optional = yes;
    MAPGEOM:  load = PRG06,  optional = yes;
    TITLE:    load = PRG07,  optional = yes;
    MUSIC0:   load = PRG08,  optional = yes;
    HUDCODE:  load = PRG09,  optional = yes;
    DOORCODE: load = PRG0D,  optional = yes;

    CODE:     load = PRG0E,  optional = yes;
    FIXED:    load = PRG0F0;
    VECTORS:  load = PRG0FV;

    CHRDATA:  load = CHR,    optional = yes;
}
